name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. Algorithm validation (pure Python, no hardware needed) ─────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Kalman filter unit tests
        run: python test_kalman.py

  # ── 2. Firmware build ─────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32
          command: idf.py build
        env:
          SIMULATION_MODE: "1"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/barometer_kalman.bin
            build/barometer_kalman.elf
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin

  # ── 3. Wokwi hardware-in-the-loop simulation ──────────────────────────────
  wokwi:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: build

      - name: Run Wokwi simulation
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          timeout: 30000
          expect_text: "raw_Pa"
        continue-on-error: true
